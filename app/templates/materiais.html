<h2>Cadastrar Material</h2>

<form method="POST">
    <label>Nome:</label>
    <input type="text" name="nome" required>

    <label>Custo Unitário:</label>
    <input type="number" step="0.01" name="custo_unitario" required>

    <label>Unidade de Medida:</label>
    <input type="text" name="unidade" required>

    <button type="submit">Salvar</button>
</form>

<h2>Lista de Materiais</h2>

<table border="1">
    <tr>
        <th>Nome</th>
        <th>Custo</th>
        <th>Unidade</th>
        <th>Ações</th>
    </tr>

{% for material in materiais %} <!--percorre a lista-->
<tr>
    <td>{{ material.nome }}</td>
    <td> R$ {{ "%.2f"|format(material.custo_unitario) }}</td>
    <td>{{ material.unidade_medida }}</td>
    <td>
        <a href="{{ url_for('main.editar_material', id=material.id) }}">Editar</a>
        |
        <a href="/excluir_material/{{ material.id }}">Excluir</a>
    </td>
</tr>
{% endfor %}

</table>
